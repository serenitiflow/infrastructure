name: 'Gradle Build'
description: 'Build a Gradle project and upload artifacts'

inputs:
  java-version:
    description: 'Java version to use'
    default: '17'
    required: false
  java-distribution:
    description: 'Java distribution to use'
    default: 'temurin'
    required: false
  artifact-name:
    description: 'Name for the uploaded artifacts'
    default: 'build-artifacts'
    required: false
  artifact-path:
    description: 'Path to upload artifacts from'
    default: 'build/libs/'
    required: false
  github-actor:
    description: 'GitHub actor for package repository authentication'
    default: ''
    required: false
  github-token:
    description: 'GitHub token for package repository authentication'
    default: ''
    required: false

outputs:
  build-status:
    description: 'Build status'
    value: ${{ steps.build.outcome }}

runs:
  using: composite
  steps:
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: ${{ inputs.java-version }}
        distribution: ${{ inputs.java-distribution }}
        cache: gradle

    - name: Grant execute permission for gradlew
      shell: bash
      run: chmod +x gradlew

    - name: Build with Gradle
      id: build
      shell: bash
      run: ./gradlew build --no-daemon -Pgpr.user="$GITHUB_ACTOR" -Pgpr.key="$GITHUB_TOKEN"
      env:
        GITHUB_ACTOR: ${{ inputs.github-actor }}
        GITHUB_TOKEN: ${{ inputs.github-token }}

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.artifact-path }}

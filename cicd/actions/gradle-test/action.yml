name: 'Gradle Test'
description: 'Run Gradle tests and upload results'

inputs:
  java-version:
    description: 'Java version to use'
    default: '17'
    required: false
  java-distribution:
    description: 'Java distribution to use'
    default: 'temurin'
    required: false
  test-results-path:
    description: 'Path to test results'
    default: 'build/reports/tests/'
    required: false
  artifact-name:
    description: 'Name for the uploaded test results'
    default: 'test-results'
    required: false
  github-actor:
    description: 'GitHub actor for package repository authentication'
    default: ''
    required: false
  github-token:
    description: 'GitHub token for package repository authentication'
    default: ''
    required: false

outputs:
  test-status:
    description: 'Test execution status'
    value: ${{ steps.test.outcome }}

runs:
  using: composite
  steps:
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: ${{ inputs.java-version }}
        distribution: ${{ inputs.java-distribution }}
        cache: gradle

    - name: Grant execute permission for gradlew
      shell: bash
      run: chmod +x gradlew

    - name: Run tests
      id: test
      shell: bash
      run: ./gradlew test --no-daemon -Pgpr.user="$GITHUB_ACTOR" -Pgpr.key="$GITHUB_TOKEN"
      env:
        GITHUB_ACTOR: ${{ inputs.github-actor }}
        GITHUB_TOKEN: ${{ inputs.github-token }}

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.test-results-path }}

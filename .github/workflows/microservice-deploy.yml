      - name: Apply Kubernetes manifests
        run: |
          echo "Applying manifests from config/k8s/prod/..."
          kubectl apply -f config/k8s/prod/

      - name: Deploy to EKS
        id: deploy
        run: |
          DEPLOYMENT_NAME="${{ inputs.service-name }}"
          NAMESPACE="${{ inputs.eks-namespace-prod }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"

          echo "Deploying to EKS..."
          echo "  Deployment: $DEPLOYMENT_NAME"
          echo "  Namespace:  $NAMESPACE"
          echo "  Image:      $IMAGE"
          echo "  Cluster:    ${{ inputs.eks-cluster-name }}"
          echo ""

          # Update deployment image to the built SHA-tagged image
          kubectl set image deployment/$DEPLOYMENT_NAME -n $NAMESPACE $DEPLOYMENT_NAME=$IMAGE

          # Restart deployment to pull new image
          kubectl rollout restart deployment/$DEPLOYMENT_NAME -n $NAMESPACE
          kubectl rollout status deployment/$DEPLOYMENT_NAME -n $NAMESPACE --timeout=${{ inputs.deploy-timeout-minutes }}m

          echo "✓ EKS deployment completed"
          echo "url=https://api-prod.serenityflow.io" >> $GITHUB_OUTPUT

      - name: Verify EKS Deployment Health
        timeout-minutes: ${{ inputs.health-check-timeout-minutes }}
        run: |
          DEPLOYMENT_NAME="${{ inputs.service-name }}"
          NAMESPACE="${{ inputs.eks-namespace-prod }}"

          echo "Checking pod health..."
          kubectl get pods -n $NAMESPACE -l app=$DEPLOYMENT_NAME

          # Wait for pods to be ready
          kubectl wait --for=condition=ready pod \
            -l app=$DEPLOYMENT_NAME \
            -n $NAMESPACE \
            --timeout=${{ inputs.health-check-timeout-minutes }}m

          echo "✓ All pods are ready"

      - name: EKS Production Deployment Summary
        if: always()
        run: |
          echo ""
          echo "============================================================"
          echo "           EKS Production Deployment Summary                "
          echo "============================================================"
          echo "Service: ${{ inputs.service-name }}"
          echo "Cluster: ${{ inputs.eks-cluster-name }}"
          echo "Namespace: ${{ inputs.eks-namespace-prod }}"
          if [ "${{ job.status }}" == "success" ]; then
            echo "✓ EKS production deployment completed successfully!"
          else
            echo "✗ EKS production deployment failed or was skipped"
          fi
          echo ""

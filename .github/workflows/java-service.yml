name: Java Service CI/CD

on:
  workflow_call:
    inputs:
      java-version:
        description: 'Java version to use'
        default: '17'
        required: false
        type: string
      java-distribution:
        description: 'Java distribution to use'
        default: 'temurin'
        required: false
        type: string
      service-name:
        description: 'Name of the service'
        required: true
        type: string
      artifact-path:
        description: 'Path to build artifacts'
        default: 'build/libs/'
        required: false
        type: string
      test-results-path:
        description: 'Path to test results'
        default: 'build/reports/tests/'
        required: false
        type: string
      deploy-enabled:
        description: 'Enable deployment to development environment'
        default: true
        required: false
        type: boolean
    # -------------------------------------------------------------------------
    # Secrets Naming Convention
    # -------------------------------------------------------------------------
    # Coolify secrets: {RESOURCE}_{ENV} format
    #   - coolify-url-dev, coolify-url-prod
    #   - coolify-api-token-dev, coolify-api-token-prod
    #   - coolify-app-uuid-dev, coolify-app-uuid-prod
    #   - service-url-dev, service-url-prod
    #
    # These should be configured at the repository or organization level
    # in GitHub Secrets for each service that uses this workflow.
    # -------------------------------------------------------------------------
    secrets:
      github-token:
        description: 'GitHub token for package repository authentication'
        required: true
      gpr-username:
        description: 'GitHub username for GitHub Packages'
        required: false
      gpr-token:
        description: 'GitHub token with packages:write scope'
        required: false
      coolify-url-dev:
        description: 'Coolify development instance URL'
        required: false
      coolify-api-token-dev:
        description: 'Coolify API token for development'
        required: false
      coolify-app-uuid-dev:
        description: 'Coolify application UUID for development'
        required: false
      service-url-dev:
        description: 'Service URL for health/version verification'
        required: false
      coolify-url-prod:
        description: 'Coolify production instance URL'
        required: false
      coolify-api-token-prod:
        description: 'Coolify API token for production'
        required: false
      coolify-app-uuid-prod:
        description: 'Coolify application UUID for production'
        required: false
      service-url-prod:
        description: 'Service URL for production health/version verification'
        required: false

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: ${{ inputs.java-distribution }}
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        id: build
        run: ./gradlew build --no-daemon -Pgpr.user="${GPR_USERNAME}" -Pgpr.key="${GPR_TOKEN}"
        env:
          GPR_USERNAME: ${{ secrets.gpr-username || github.actor }}
          GPR_TOKEN: ${{ secrets.gpr-token || secrets.github-token }}

      - name: Run tests
        id: test
        run: ./gradlew test --no-daemon -Pgpr.user="${GPR_USERNAME}" -Pgpr.key="${GPR_TOKEN}"
        env:
          GPR_USERNAME: ${{ secrets.gpr-username || github.actor }}
          GPR_TOKEN: ${{ secrets.gpr-token || secrets.github-token }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.service-name }}-build-artifacts
          path: ${{ inputs.artifact-path }}
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ inputs.service-name }}-test-results
          path: ${{ inputs.test-results-path }}
          retention-days: 7

      - name: Upload build reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ inputs.service-name }}-build-reports
          path: build/reports/
          retention-days: 7

  deploy-dev:
    name: Deploy to Development
    needs: build-and-test
    if: inputs.deploy-enabled && github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: development
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: ${{ inputs.java-distribution }}
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Docker image
        run: |
          VERSION="0.0.1-$(echo '${{ github.sha }}' | cut -c1-7)"
          echo "Building with version: $VERSION"
          ./gradlew bootBuildImage --no-daemon \
            -Pversion=$VERSION \
            -Pgpr.user="${GPR_USERNAME}" \
            -Pgpr.key="${GPR_TOKEN}"
        env:
          GPR_USERNAME: ${{ secrets.gpr-username || github.actor }}
          GPR_TOKEN: ${{ secrets.gpr-token || secrets.github-token }}

      - name: Trigger Development Deployment
        id: deploy
        env:
          COOLIFY_URL_DEV: ${{ secrets.COOLIFY_URL_DEV }}
          COOLIFY_API_TOKEN_DEV: ${{ secrets.COOLIFY_API_TOKEN_DEV }}
          COOLIFY_APP_UUID_DEV: ${{ secrets.COOLIFY_APP_UUID_DEV }}
        run: |
          echo "Triggering development deployment..."

          if [ -z "$COOLIFY_URL_DEV" ] || [ -z "$COOLIFY_API_TOKEN_DEV" ] || [ -z "$COOLIFY_APP_UUID_DEV" ]; then
            echo "WARNING: Coolify dev secrets not configured. Skipping deployment."
            echo "url=" >> $GITHUB_OUTPUT
            exit 0
          fi

          HTTP_CODE=$(curl -sL --max-time 30 -o /tmp/coolify_response.json -w "%{http_code}" -X POST \
            "$COOLIFY_URL_DEV/api/v1/applications/$COOLIFY_APP_UUID_DEV/restart" \
            -H "Authorization: Bearer $COOLIFY_API_TOKEN_DEV" \
            -H "Content-Type: application/json")

          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ] || [ "$HTTP_CODE" = "202" ]; then
            echo "Development deployment triggered successfully (HTTP $HTTP_CODE)"
            cat /tmp/coolify_response.json
            echo "url=$COOLIFY_URL_DEV" >> $GITHUB_OUTPUT
          else
            echo "ERROR: Coolify API returned HTTP $HTTP_CODE"
            cat /tmp/coolify_response.json
            exit 1
          fi

      - name: Wait for Deployment
        timeout-minutes: 10
        env:
          COOLIFY_API_TOKEN_DEV: ${{ secrets.COOLIFY_API_TOKEN_DEV }}
          COOLIFY_URL_DEV: ${{ secrets.COOLIFY_URL_DEV }}
          COOLIFY_APP_UUID_DEV: ${{ secrets.COOLIFY_APP_UUID_DEV }}
        run: |
          if [ -z "$COOLIFY_URL_DEV" ]; then
            echo "Skipping deployment wait - Coolify not configured"
            exit 0
          fi

          MAX_RETRIES=30
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            RESPONSE=$(curl -s -H "Authorization: Bearer $COOLIFY_API_TOKEN_DEV" \
              "$COOLIFY_URL_DEV/api/v1/applications/$COOLIFY_APP_UUID_DEV" 2>/dev/null || echo '{"status": "unknown"}')

            STATUS=$(echo "$RESPONSE" | jq -r '.status // "unknown"')

            case "$STATUS" in
              "running"|"running:"*)
                echo "Deployment completed successfully! (status: $STATUS)"
                exit 0
                ;;
              "error"|"failed")
                echo "Deployment failed! (status: $STATUS)"
                exit 1
                ;;
              "building"|"deploying")
                echo "Deployment in progress... ($STATUS) - attempt $((RETRY_COUNT+1))/$MAX_RETRIES"
                ;;
              *)
                echo "Waiting... (status: $STATUS) - attempt $((RETRY_COUNT+1))/$MAX_RETRIES"
                ;;
            esac

            RETRY_COUNT=$((RETRY_COUNT+1))
            sleep 10
          done

          echo "Deployment wait timed out"

      - name: Verify Application Health
        timeout-minutes: 5
        env:
          SERVICE_URL_DEV: ${{ secrets.SERVICE_URL_DEV }}
        run: |
          echo "Verifying application health endpoint..."

          if [ -z "$SERVICE_URL_DEV" ]; then
            echo "WARNING: SERVICE_URL_DEV not set. Skipping health verification."
            exit 0
          fi

          MAX_RETRIES=30
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            HTTP_CODE=$(curl -s -o /tmp/health_response.json -w "%{http_code}" \
              "$SERVICE_URL_DEV/actuator/health" 2>/dev/null || echo "000")

            if [ "$HTTP_CODE" = "200" ]; then
              STATUS=$(jq -r '.status // "unknown"' /tmp/health_response.json 2>/dev/null || echo "unknown")
              if [ "$STATUS" = "UP" ]; then
                echo "Health check passed!"
                cat /tmp/health_response.json
                exit 0
              fi
            fi

            echo "Health check attempt $((RETRY_COUNT+1))/$MAX_RETRIES: status=$STATUS"
            RETRY_COUNT=$((RETRY_COUNT+1))
            sleep 2
          done

          echo "ERROR: Health check failed after $MAX_RETRIES attempts"
          exit 1

      - name: Verify Deployed Version
        timeout-minutes: 5
        env:
          SERVICE_URL_DEV: ${{ secrets.SERVICE_URL_DEV }}
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          echo "Verifying deployed version..."
          echo "Expected SHA: $EXPECTED_SHA"

          if [ -z "$SERVICE_URL_DEV" ]; then
            echo "WARNING: SERVICE_URL_DEV not set. Skipping version verification."
            exit 0
          fi

          EXPECTED_SHA_SHORT=$(echo "$EXPECTED_SHA" | cut -c1-7)
          MAX_RETRIES=60
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            HTTP_CODE=$(curl -s -o /tmp/info_response.json -w "%{http_code}" \
              "$SERVICE_URL_DEV/actuator/info" 2>/dev/null || echo "000")

            if [ "$HTTP_CODE" = "200" ]; then
              DEPLOYED_VERSION=$(jq -r '.build.version // "unknown"' /tmp/info_response.json 2>/dev/null || echo "unknown")
              DEPLOYED_SHA_SHORT=$(echo "$DEPLOYED_VERSION" | grep -oE '[a-f0-9]{7}$' || echo "")

              if [ "$DEPLOYED_SHA_SHORT" = "$EXPECTED_SHA_SHORT" ]; then
                echo "Version verification passed!"
                echo "  Deployed: $DEPLOYED_VERSION"
                exit 0
              fi

              echo "Version check attempt $((RETRY_COUNT+1))/$MAX_RETRIES:"
              echo "  Current: $DEPLOYED_VERSION (SHA: $DEPLOYED_SHA_SHORT)"
              echo "  Expected: 0.0.1-$EXPECTED_SHA_SHORT"
            else
              echo "Version check attempt $((RETRY_COUNT+1))/$MAX_RETRIES: HTTP $HTTP_CODE"
            fi

            RETRY_COUNT=$((RETRY_COUNT+1))
            sleep 5
          done

          echo "ERROR: Version verification timed out"
          exit 1

  deploy-prod:
    name: Deploy to Production
    needs: build-and-test
    if: inputs.deploy-enabled && github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: ${{ inputs.java-distribution }}
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Docker image
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Building with version: $VERSION"

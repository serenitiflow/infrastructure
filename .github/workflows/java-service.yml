            echo "WARNING: Coolify prod secrets not configured. Skipping deployment."
            echo "url=" >> $GITHUB_OUTPUT
            exit 0
          fi

          HTTP_CODE=$(curl -sL --max-time 30 -o /tmp/coolify_response.json -w "%{http_code}" -X POST \
            "$COOLIFY_URL_PROD/api/v1/applications/$COOLIFY_APP_UUID_PROD/restart" \
            -H "Authorization: Bearer $COOLIFY_API_TOKEN_PROD" \
            -H "Content-Type: application/json")

          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ] || [ "$HTTP_CODE" = "202" ]; then
            echo "Production deployment triggered successfully (HTTP $HTTP_CODE)"
            cat /tmp/coolify_response.json
            echo "url=$COOLIFY_URL_PROD" >> $GITHUB_OUTPUT

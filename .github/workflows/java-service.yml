            echo "ERROR: Coolify API returned HTTP $HTTP_CODE"
            cat /tmp/coolify_response.json
            exit 1
          fi

      - name: Wait for Deployment
        timeout-minutes: 10
        env:
          COOLIFY_API_TOKEN_PROD: ${{ secrets.COOLIFY_API_TOKEN_PROD }}
          COOLIFY_URL_PROD: ${{ secrets.COOLIFY_URL_PROD }}
          COOLIFY_APP_UUID_PROD: ${{ secrets.COOLIFY_APP_UUID_PROD }}
        run: |
          if [ -z "$COOLIFY_URL_PROD" ]; then
            echo "Skipping deployment wait - Coolify not configured"
            exit 0
          fi

          MAX_RETRIES=30
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            RESPONSE=$(curl -s -H "Authorization: Bearer $COOLIFY_API_TOKEN_PROD" \
              "$COOLIFY_URL_PROD/api/v1/applications/$COOLIFY_APP_UUID_PROD" 2>/dev/null || echo '{"status": "unknown"}')

            STATUS=$(echo "$RESPONSE" | jq -r '.status // "unknown"')

            case "$STATUS" in
              "running"|"running:")
                echo "Deployment completed successfully! (status: $STATUS)"
                exit 0
                ;;
              "error"|"failed")
                echo "Deployment failed! (status: $STATUS)"
                exit 1
                ;;
              "building"|"deploying")
                echo "Deployment in progress... ($STATUS) - attempt $((RETRY_COUNT+1))/$MAX_RETRIES"
                ;;
              *)
                echo "Waiting... (status: $STATUS) - attempt $((RETRY_COUNT+1))/$MAX_RETRIES"
                ;;
            esac

            RETRY_COUNT=$((RETRY_COUNT+1))
            sleep 10
          done

          echo "Deployment wait timed out"

      - name: Verify Application Health
        timeout-minutes: 5
        env:
          SERVICE_URL_PROD: ${{ secrets.SERVICE_URL_PROD }}
        run: |
          echo "Verifying application health endpoint..."

          if [ -z "$SERVICE_URL_PROD" ]; then
            echo "WARNING: SERVICE_URL_PROD not set. Skipping health verification."
            exit 0
          fi

          MAX_RETRIES=30
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            HTTP_CODE=$(curl -s -o /tmp/health_response.json -w "%{http_code}" \
              "$SERVICE_URL_PROD/actuator/health" 2>/dev/null || echo "000")

            if [ "$HTTP_CODE" = "200" ]; then
              STATUS=$(jq -r '.status // "unknown"' /tmp/health_response.json 2>/dev/null || echo "unknown")
              if [ "$STATUS" = "UP" ]; then
                echo "Health check passed!"
                cat /tmp/health_response.json
                exit 0
              fi
            fi

            echo "Health check attempt $((RETRY_COUNT+1))/$MAX_RETRIES: status=$STATUS"
            RETRY_COUNT=$((RETRY_COUNT+1))
            sleep 2
          done

          echo "ERROR: Health check failed after $MAX_RETRIES attempts"
          exit 1

      - name: Verify Deployed Version
        timeout-minutes: 5
        env:
          SERVICE_URL_PROD: ${{ secrets.SERVICE_URL_PROD }}
          EXPECTED_VERSION: ${{ github.ref_name }}
        run: |
          echo "Verifying deployed version..."
          echo "Expected version: $EXPECTED_VERSION"

          if [ -z "$SERVICE_URL_PROD" ]; then
            echo "WARNING: SERVICE_URL_PROD not set. Skipping version verification."
            exit 0
          fi

          MAX_RETRIES=60
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do

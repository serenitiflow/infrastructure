apiVersion: v1
kind: ServiceAccount
metadata:
  name: serenity-services
  namespace: prod-serenity
  annotations:
    # Shared IAM role for all prod-serenity services.
    # Attach a trust policy that allows the EKS OIDC provider to assume this role.
    # If a service needs different AWS permissions, create a dedicated SA for it.
    eks.amazonaws.com/role-arn: "arn:aws:iam::692046683886:role/prod-serenity-services-role"
  labels:
    environment: prod
    project: serenity

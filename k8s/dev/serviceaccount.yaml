apiVersion: v1
kind: ServiceAccount
metadata:
  name: serenity-services
  namespace: dev-serenity
  annotations:
    # Shared IAM role for all dev-serenity services.
    # Attach a trust policy that allows the EKS OIDC provider to assume this role.
    # If a service needs different AWS permissions, create a dedicated SA for it.
    eks.amazonaws.com/role-arn: "arn:aws:iam::<ACCOUNT_ID>:role/dev-serenity-services-role"
  labels:
    environment: dev
    project: serenity
